<!DOCTYPE html>
<!--
    PÁGINA DE LOGIN
    Página para autenticação de usuários
    Contém formulário com campos de email e senha
    Oferece opção de recuperação de senha
-->
<html lang="pt-br">

<head>
    <!-- Configurações de metadados -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Estilos da página de login -->
    <link rel="stylesheet" href="login.css">
    <!-- Estilos globais -->
    <link rel="stylesheet" href="../../style.css">
    <!-- Estilos do menu dropdown de usuário -->
    <link rel="stylesheet" href="../../componentes/dropdown-menu/dropdown-menu.css">
    <!-- Script do menu dropdown -->
    <script type="text/javascript" src="../../componentes/dropdown-menu/dropdown-menu.js" defer></script>
    <script type="text/javascript" src="../../componentes/theme-toggle.js" defer></script>
    <script type="text/javascript" src="../../componentes/mobile-menu/mobile-menu.js" defer></script>
    <!-- Fonte Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- Ícones Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <!-- Favicon -->
    <link rel="shortcut icon" href="../../assets/logo zf.png" type="image/x-icon">
    <title>Zero Frame</title>
</head>

<body>

    <header class="header">

        <a href="../../index.html" class="logo-link-header">
            <img src="../../assets/logo zf.png" alt="Zero Frame Logo" class="logo">
        </a>
        <nav class="navigation-header" id="mainNav">
            <ul class="nav-menus-ul links">
                <li><a href="../../pages/search/search.html?q=Originais" class="itens-nav-menus" target="_blank">ORIGINAIS</a></li>
                <li><a href="../../pages/search/search.html?q=Multimarcas" class="itens-nav-menus" target="_blank">MULTIMARCAS</a></li>
                <li><a href="../../pages/sobre/sobre.html" class="itens-nav-menus" target="_blank">SOBRE NÓS</a></li>
            </ul>

            <form action="../../pages/search/search.html" method="GET" class="search-bar-container">
                <input type="text" name="q" placeholder="O que você está procurando?" class="search-bar" id="searchInput">
                <button type="submit" class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </form>
        </nav>

        <div class="header-right-actions">
            <ul class="user-actions-ul links">
                <li class="user-actions-li"><a href="../../pages/carrinho/carrinho.html" class="user-actions-icon"><i class="fa-solid fa-cart-shopping"></i></a></li>
                <li class="dropdown user-actions-li">
                    <button class="user-dropdown-icon" id="userMenuIcon"><i class="fa-solid fa-user"></i></button>
                    <ul class="dropdown-content" id="dropdownMenu">
                        <li class="dropdown-header">
                            <div class="dropdown-header-text">
                                <h3>Username</h3>
                                <p>email@email.com</p>
                            </div>
                            <a href="#"><i class="fa-solid fa-gear"></i></a>
                        </li>
                        <hr class="hr-dropdown">
                        <li><a href="../meus-pedidos/pedidos.html">Meus Pedidos</a></li>
                        <li><a href="../favoritos/favoritos.html">Favoritos</a></li>
                        <li><a href="../meus-enderecos/enderecos.html">Meus endereços</a></li>
                        <hr class="hr-dropdown">
                        <li><button class="theme-toggle-btn" id="toggle-button">Alternar tema</button></li>
                        <li><a href="../../pages/suporte/suporte.html" target="_blank">Suporte</a></li>
                        <hr class="hr-dropdown">
                        <li><a href="#">Sair da conta <i class="fa-solid fa-arrow-right-from-bracket"></i></a></li>
                    </ul>
                </li>
            </ul>
            <button class="hamburger-btn" id="hamburgerBtn" aria-label="Abrir menu">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <div vw class="enabled">
            <div vw-access-button class="active"></div>
            <div vw-plugin-wrapper>
                <div class="vw-plugin-top-wrapper"></div>
            </div>
        </div>

    </header>


    <main class="main-content">

        <div class="login-container">

            <h1 class="login-title">LOGIN</h1>
            <h2 class="login-subtitle">Acesse sua conta</h2>
            <form class="login-form">
                <div class="login-input-container">
                    <input type="email" placeholder="digite seu email" class="login-input">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="login-input-container">
                    <input type="password" placeholder="digite sua senha" class="login-input">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <button type="submit" class="login-button">Entrar</button>
                <a href="#" class="forgot-password-link">Esqueci minha senha</a>
            </form>

            <div class="register-container">
                <h2 class="register-prompt">Não tem uma conta?</h2>
                <a href="../register-page/register.html" class="register-link">Registre-se</a>
            </div>
        </div>

        <img src="assets/logo zf.png" alt="Zero Frame Logo" class="logo-login">

    </main>

    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
    
</body>

</html>
